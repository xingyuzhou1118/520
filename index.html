<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>520 专属表白 - 吕瑞寒</title>
    <style>
        /* --- 基础样式 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            height: 100vh; overflow: hidden;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; touch-action: manipulation;
        }
        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .header-title {
            position: absolute; top: 10%; width: 100%; text-align: center;
            color: #d6336c; font-size: 1.8rem; font-weight: bold;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.8); z-index: 10;
            animation: fadeInDown 1.5s ease-out;
        }
        .heart-container {
            position: relative; width: 150px; height: 150px; z-index: 20;
            cursor: pointer; transition: transform 0.1s;
        }
        .heart-beat { animation: beat 1.2s infinite ease-in-out; }
        .heart {
            background-color: #ff3860; display: inline-block; height: 100px; margin: 0 10px;
            position: relative; top: 25px; transform: rotate(-45deg); width: 100px;
            box-shadow: 0 0 40px #ff3860;
        }
        .heart:before, .heart:after {
            content: ""; background-color: #ff3860; border-radius: 50%;
            height: 100px; position: absolute; width: 100px;
        }
        .heart:before { top: -50px; left: 0; }
        .heart:after { left: 50px; top: 0; }
        .heart-container:active { transform: scale(0.9); }
        .tip-text {
            position: absolute; bottom: 20%; color: #fff; font-size: 1rem;
            opacity: 0.8; z-index: 10; animation: pulse 2s infinite;
        }
        .sweet-msg {
            position: absolute; color: #fff; font-size: 1.2rem; font-weight: bold;
            text-shadow: 0 2px 4px rgba(214, 51, 108, 0.5); pointer-events: none;
            z-index: 30; white-space: nowrap; animation: floatUp 1.5s ease-out forwards;
        }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); display: flex; justify-content: center;
            align-items: center; z-index: 100; opacity: 0; pointer-events: none;
            transition: opacity 0.5s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #fff; padding: 30px; border-radius: 20px; text-align: center;
            max-width: 80%; box-shadow: 0 10px 30px rgba(255, 56, 96, 0.4);
            transform: scale(0.8); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.show .modal-content { transform: scale(1); }
        .modal-title { color: #ff3860; font-size: 1.5rem; margin-bottom: 15px; }
        .modal-text { color: #555; font-size: 1.1rem; line-height: 1.6; }
        .close-btn {
            margin-top: 20px; padding: 10px 30px; background: #ff3860; color: #fff;
            border: none; border-radius: 25px; font-size: 1rem; cursor: pointer;
        }
        @keyframes beat {
            0% { transform: scale(1); } 14% { transform: scale(1.1); }
            28% { transform: scale(1); } 42% { transform: scale(1.1); } 70% { transform: scale(1); }
        }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-100px) scale(1.2); } }
        .flash-screen { animation: flash 0.5s ease-out; }
        @keyframes flash { 0% { background-color: #fff; } 100% { background-color: transparent; } }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="header-title">520，我爱你，吕瑞寒 ❤️</div>
    <div class="heart-container" id="mainHeart">
        <div class="heart heart-beat"></div>
    </div>
    <div class="tip-text">点击爱心，接收我的心意 💖</div>
    <div class="modal-overlay" id="eggModal">
        <div class="modal-content">
            <div class="modal-title">💌 专属情书</div>
            <div class="modal-text" id="eggText"></div>
            <button class="close-btn" onclick="closeModal()">收下啦</button>
        </div>
    </div>

    <script>
        const config = {
            name: "吕瑞寒",
            clickCount: 0,
            messages: [
                "吕瑞寒，你是我的唯一 ❤️", "爱你每一天，吕瑞寒 💖",
                "宝贝，永远爱你 ❤️ 吕瑞寒", "吕瑞寒，我每天都爱你一遍又一遍 ❤️",
                "遇见你是我这辈子最大的幸运 🍀", "想和你一起看遍世间风景 🌍",
                "吕瑞寒，你的笑容是我最大的动力 😊", "520快乐，我的宝贝！🎉",
                "愿我们的爱像星光一样永恒 ✨", "每一秒都在想你，吕瑞寒 💭",
                "你是我手心里的宝 💎", "往后余生，全都是你 💑",
                "吕瑞寒，喜欢你没道理 💕", "心跳只为你加速 💓",
                "想把你宠成小公主 👑", "有你在身边，空气都是甜的 🍬",
                "吕瑞寒，我爱你，直到永远 ♾️", "你是我所有的心事 💌",
                "今天的风很甜，因为有你 🌬️", "想把全世界最好的都给你 🎁"
            ]
        };

        // --- 🎹 纯代码生成柔和钢琴音效 (无需联网) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;

            if (type === 'heartbeat') {
                // 模拟柔和的钢琴单音 (加入更多泛音，衰减更自然)
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                // 使用三角波模拟钢琴的柔和感
                osc.type = 'triangle'; 
                // 随机选取温暖的中高音区
                const freqs = [349.23, 392.00, 440.00, 523.25]; // F4, G4, A4, C5
                const freq = freqs[Math.floor(Math.random() * freqs.length)];
                
                osc.frequency.setValueAtTime(freq, now);
                
                // 模拟钢琴的敲击与延音衰减
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.4, now + 0.02); // 快速起音
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.2); // 缓慢衰减
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start(now);
                osc.stop(now + 1.2);

            } else if (type === 'pop') {
                // 模拟轻柔的泡泡破裂/魔法点缀声
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.15);
                
                gainNode.gain.setValueAtTime(0.15, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start(now);
                osc.stop(now + 0.2);

            } else if (type === 'romantic_chord') {
                // 终极彩蛋：温柔的钢琴和弦 (C大调七和弦 Cmaj7，更有梦幻感)
                const frequencies = [261.63, 329.63, 392.00, 493.88]; // C4, E4, G4, B4
                
                frequencies.forEach((freq, index) => {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    
                    osc.type = 'triangle';
                    osc.frequency.value = freq;
                    
                    // 琶音效果，每个音错开 0.08秒
                    const startTime = now + (index * 0.08);
                    
                    gainNode.gain.setValueAtTime(0, startTime);
                    gainNode.gain.linearRampToValueAtTime(0.15, startTime + 0.05);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + 2.5);
                    
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    
                    osc.start(startTime);
                    osc.stop(startTime + 2.5);
                });
            }
        }

        // --- 粒子系统 ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let fireworks = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class HeartParticle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width; this.y = Math.random() * -height;
                this.size = Math.random() * 15 + 5; this.speed = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.color = `rgba(255, ${Math.floor(Math.random() * 100 + 100)}, ${Math.floor(Math.random() * 100 + 150)}, ${this.opacity})`;
                this.wobble = Math.random() * Math.PI * 2;
            }
            update() {
                this.y += this.speed; this.wobble += 0.05;
                this.x += Math.sin(this.wobble) * 0.5;
                if (this.y > height) this.reset();
            }
            draw() {
                ctx.fillStyle = this.color; ctx.font = `${this.size}px Arial`;
                ctx.fillText('❤️', this.x, this.y);
            }
        }

        class FireworkParticle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.size = Math.random() * 5 + 2;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
                this.life = 1; this.decay = Math.random() * 0.02 + 0.01;
                this.color = color || `hsl(${Math.random() * 60 + 330}, 100%, 60%)`;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.05; this.life -= this.decay; }
            draw() {
                ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill(); ctx.globalAlpha = 1;
            }
        }

        for (let i = 0; i < 30; i++) { particles.push(new HeartParticle()); }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            for (let i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].update(); fireworks[i].draw();
                if (fireworks[i].life <= 0) fireworks.splice(i, 1);
            }
            requestAnimationFrame(animate);
        }
        animate();

        // --- 交互逻辑 ---
        const heartContainer = document.getElementById('mainHeart');
        const modal = document.getElementById('eggModal');
        const eggText = document.getElementById('eggText');

        function createFloatingText(text, x, y) {
            const el = document.createElement('div');
            el.className = 'sweet-msg'; el.innerText = text;
            el.style.left = `${x}px`; el.style.top = `${y}px`;
            el.style.transform = `translateX(${Math.random() * 40 - 20}px)`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1500);
        }

        function createFirework(x, y, count = 30) {
            for (let i = 0; i < count; i++) { fireworks.push(new FireworkParticle(x, y)); }
        }

        heartContainer.addEventListener('click', (e) => {
            config.clickCount++;
            playSound('heartbeat');
            
            const rect = heartContainer.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            createFirework(centerX, centerY, 20);
            setTimeout(() => playSound('pop'), 100);
            
            const randomMsg = config.messages[Math.floor(Math.random() * config.messages.length)];
            createFloatingText(randomMsg, centerX - 50, centerY - 50);

            if (config.clickCount % 5 === 0) { triggerEasterEgg(); }
        });

        function triggerEasterEgg() {
            playSound('romantic_chord'); // 播放柔和钢琴和弦彩蛋音效
            document.body.classList.add('flash-screen');
            setTimeout(() => document.body.classList.remove('flash-screen'), 500);

            for(let i=0; i<5; i++) {
                setTimeout(() => {
                    createFirework(Math.random() * width, Math.random() * height * 0.8, 50);
                }, i * 200);
            }

            setTimeout(() => {
                eggText.innerHTML = `
                    <p style="font-size: 1.4rem; color: #ff3860; margin-bottom: 10px;">
                        ${config.name}，我爱你一生一世 ❤️
                    </p>
                    <p>从遇见你的那一刻起，我的世界便充满了色彩。</p>
                    <p>愿未来的每一个520，都有你相伴。</p>
                `;
                modal.classList.add('show');
            }, 800);
        }

        function closeModal() {
            modal.classList.remove('show');
            createFirework(width/2, height/2, 40);
            playSound('heartbeat');
        }

        // 页面初次交互时恢复音频上下文（兼容部分手机浏览器）
        document.body.addEventListener('click', () => {
             if (audioCtx.state === 'suspended') audioCtx.resume();
        }, { once: true });
    </script>
</body>
</html>
